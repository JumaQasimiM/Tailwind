<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind CSS</title>
    <!-- fonts -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css
   "
    />
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-600">
    <h1 class="text-center p-10 bg-slate-800 text-white font-semibold">
      Hallo Tailwind
    </h1>

    <!-- navbar -->
    <nav class="bg-slate-600">
      <ul class="flex justify-start p-2 text-white gap-1">
        <li class="p-1 w-[60px] text-center border cursor-pointer"><span class="fa fa-home"></span></li>
        <li class="p-1 w-[60px] text-center border cursor-pointer"><i class="fa-solid fa-info"></i></li>
        <li class="p-1 w-[60px] text-center border cursor-pointer"><i class="fa-solid fa-address-book"></i></li>
      </ul>
    </nav>

    <div
      class="contianer w-[98%] mx-auto text-white grid grid-cols-[30%_70%] gap-1"
      id="contianer"
    >
      <div class="bg-slate-900 p-2">
        <ul>
          <li>Home</li>
          <li>Home</li>
          <li>Home</li>
          <li>Home</li>
          <li>Home</li>
          <li>Home</li>
          <li>Home</li>
          <li>Home</li>
          <li>Home</li>
        </ul>
      </div>
      <div class="bg-slate-700 p-2">
        <h1 class="p-1 text-center">Content</h1>
      </div>
    </div>
    <!-- footer -->
    <div class="flex w-[98%] mx-auto">
      <div class="border basis-[30%] grow p-2">
        <h2 class="p-1 text-yellow-400 text-2xl font-bold">
          <a href="#">Home</a>
        </h2>
        <h2 class="p-1 text-yellow-400 text-2xl font-bold">
          <a href="#">About</a>
        </h2>
        <h2 class="p-1 text-yellow-400 text-2xl font-bold">
          <a href="#">Contuct</a>
        </h2>
      </div>
      <div
        class="flex flex-col border basis-[60%] grow p-2 text-center text-white"
      >
        <div class="p-2">
          <h2 class="p-2 pb-4 border-b-2 border-red-200 font-bold">
            Fllow me in Social Midea
          </h2>
          <div class="p-2 cursor-pointer">
            <i class="fa-brands fa-twitter text-2xl p-1 hover:text-red-400"></i>
            <i
              class="fa-brands fa-linkedin-in text-2xl p-1 hover:text-red-400"
            ></i>
            <i
              class="fa-brands fa-instagram text-2xl p-1 hover:text-red-400"
            ></i>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
